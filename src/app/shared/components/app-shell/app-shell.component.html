<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__brand">
      <span class="shell__brand-mark">TP</span>
      <span class="shell__brand-text">{{ titulo() }}</span>
    </div>

    <nav class="shell__nav">
      @for (item of navItems(); track item.ruta) {
        <a [routerLink]="item.ruta"
           routerLinkActive="is-active"
           class="shell__nav-item">
          <span class="shell__nav-icon">{{ item.icono }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <button type="button" class="shell__logout" (click)="cerrarSesion()">
      <span>↩</span> Cerrar sesión
    </button>
  </aside>

  <div class="shell__main">
    <header class="shell__topbar">
      <div class="shell__topbar-user">
        <strong>{{ auth.sesion()?.nombreCompleto }}</strong>
        <small>{{ auth.sesion()?.email }} · {{ auth.sesion()?.rol }}</small>
      </div>
    </header>

    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
