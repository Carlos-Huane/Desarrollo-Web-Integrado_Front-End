<div class="login-page">
  <form class="login-card" [formGroup]="form" (ngSubmit)="enviar()">
    <h1 class="login-card__title">{{ appName }}</h1>
    <p class="login-card__subtitle">Inicia sesión para continuar</p>

    <label class="field">
      <span>Correo electrónico</span>
      <input type="email" formControlName="email" autocomplete="email" placeholder="usuario@telecoperu.com" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <small class="field__error">Ingresa un correo válido</small>
      }
    </label>

    <label class="field">
      <span>Contraseña</span>
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <small class="field__error">Mínimo 6 caracteres</small>
      }
    </label>

    @if (errorMsg()) {
      <div class="alert alert--error">{{ errorMsg() }}</div>
    }

    <button type="submit" class="btn btn--primary" [disabled]="form.invalid || cargando()">
      {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <p class="login-card__hint">
      Curso: Desarrollo Web Integrado · Grupo 6
    </p>
  </form>
</div>
