<div class="login-page">
  <form class="login-card" [formGroup]="form" (ngSubmit)="enviar()" novalidate>
    <h1 class="login-card__title">{{ appName }}</h1>
    <p class="login-card__subtitle">Inicia sesión para continuar</p>

    <label class="field" [class.field--invalid]="invalido('email')">
      <span class="field__label">Correo electrónico</span>
      <input type="email" formControlName="email" autocomplete="email" placeholder="usuario@telecoperu.com" />
      @if (invalido('email')) {
        <small class="field__error">
          {{ form.controls.email.errors?.['required'] ? 'El correo es obligatorio' : 'Ingresa un correo válido' }}
        </small>
      }
    </label>

    <label class="field" [class.field--invalid]="invalido('password')">
      <span class="field__label">Contraseña</span>
      <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
      @if (invalido('password')) {
        <small class="field__error">
          {{ form.controls.password.errors?.['required'] ? 'La contraseña es obligatoria' : 'Mínimo 6 caracteres' }}
        </small>
      }
    </label>

    @if (errorMsg()) {
      <div class="alert alert--error">{{ errorMsg() }}</div>
    }

    <button type="submit" class="btn btn--primary" [disabled]="cargando()">
      {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
    </button>

    <p class="login-card__hint">
      Curso: Desarrollo Web Integrado · Grupo 6
    </p>
  </form>
</div>
